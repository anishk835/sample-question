name: Java CI - Run All Programs

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:  # Allows manual trigger from GitHub UI

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Build with Maven
      run: mvn clean compile

    - name: Run all tests
      run: mvn test
      continue-on-error: true  # Continue even if some tests fail

    - name: Generate test report
      if: always()
      uses: dorny/test-reporter@v1
      with:
        name: JUnit Test Results
        path: target/surefire-reports/*.xml
        reporter: java-junit
        fail-on-error: false

    - name: Run sample programs
      run: |
        echo "========================================="
        echo "Running Binary Tree Demo"
        echo "========================================="
        mvn exec:java -Dexec.mainClass="com.java.recruitme.algo.BinaryTree" || true

        echo ""
        echo "========================================="
        echo "Running Dijkstra Algorithm"
        echo "========================================="
        mvn exec:java -Dexec.mainClass="com.java.recruitme.algo.DijkstraAlgo" || true

        echo ""
        echo "========================================="
        echo "Running Producer-Consumer Demo"
        echo "========================================="
        timeout 10s mvn exec:java -Dexec.mainClass="com.java.recruitme.threads.ProducerConsumerDemo" || true

        echo ""
        echo "========================================="
        echo "Running Character Count"
        echo "========================================="
        mvn exec:java -Dexec.mainClass="com.java.recruitme.characterCount.CharacterCount" || true

        echo ""
        echo "========================================="
        echo "Running Prime Number Generator"
        echo "========================================="
        mvn exec:java -Dexec.mainClass="com.java.recruitme.primes.Prime" || true

    - name: Display summary
      if: always()
      run: |
        echo "========================================="
        echo "Build and Test Summary"
        echo "========================================="
        echo "✅ Build completed"
        echo "📊 Test results available in Actions tab"
        echo "🔍 Check individual job steps for program outputs"
        echo "========================================="
